services:
  db:
    image: postgres:17
    container_name: django_postgres_db
    restart: always
    environment:
      POSTGRES_DB: ready_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Channel layer for real-time notifications (Channels). Used in production /
  # multi-process setups. Local `runserver` falls back to the in-memory layer,
  # so Redis is optional in plain dev.
  redis:
    image: redis:7
    container_name: ready_redis
    restart: always
    ports:
      - "6379:6379"

  # Captures all outgoing emails in dev — no real SMTP needed.
  # Access the inbox at http://localhost:8025
  # In .env set: EMAIL_HOST=localhost  EMAIL_PORT=1025
  mailpit:
    image: axllent/mailpit:latest
    container_name: ready_mailpit
    restart: always
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
