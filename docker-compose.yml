services:
  db:
    image: postgres:17
    container_name: django_postgres_db
    restart: always
    environment:
      POSTGRES_DB: ready_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: