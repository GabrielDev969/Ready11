<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../tokens.css"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;font-family:var(--gss-font-sans);background:#FAFAF7;padding:18px;}
  .row{display:grid;grid-template-columns:1fr 1fr 0.8fr;gap:14px;}
  .card{background:#fff;border:1px solid #E8E6DF;border-radius:10px;padding:16px;}
  .cap{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:#6E6E76;margin:0 0 12px;}
  .metric-lg{font-weight:500;font-size:26px;line-height:1;font-variant-numeric:tabular-nums;}
</style></head><body>
<div class="row">
  <div class="card">
    <p class="cap">Sparkline</p>
    <svg width="100%" height="60" viewBox="0 0 220 60" preserveAspectRatio="none" id="s"></svg>
  </div>
  <div class="card">
    <p class="cap">Barras · PSE</p>
    <svg width="100%" height="60" viewBox="0 0 220 60" id="b"></svg>
  </div>
  <div class="card" style="display:flex;justify-content:center;">
    <div style="position:relative;width:84px;height:84px;">
      <svg width="84" height="84" id="r"></svg>
      <div style="position:absolute;inset:0;display:grid;place-items:center;"><span class="metric-lg">4.2</span></div>
    </div>
  </div>
</div>
<script>
const C=getComputedStyle(document.documentElement),col=n=>C.getPropertyValue(n).trim();
(function(){const v=[3.2,3.6,3.9,4.1,3.8,4.0,4.2,4.3,4.0,3.7,3.9,4.1,4.3,4.2],w=220,h=60,mn=Math.min(...v),mx=Math.max(...v),r=mx-mn,sx=w/(v.length-1);const p=v.map((x,i)=>`${i?'L':'M'} ${i*sx} ${h-((x-mn)/r)*(h-8)-4}`).join(' ');document.getElementById('s').innerHTML=`<path d="${p} L ${w} ${h} L 0 ${h} Z" fill="${col('--gss-excellent-fg')}" opacity=".08"/><path d="${p}" fill="none" stroke="${col('--gss-excellent-fg')}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;})();
(function(){const v=[6,7,5,8,4,6,7,9,6,5,7,8,6,7],w=220,h=60,mx=10,bw=w/v.length-3;let s='';v.forEach((x,i)=>{const bh=(x/mx)*(h-8),px=i*(bw+3);s+=`<rect x="${px}" y="${h-bh}" width="${bw}" height="${bh}" rx="1.5" fill="${col('--gss-fg')}"/>`;});document.getElementById('b').innerHTML=s;})();
(function(){const sz=84,sw=8,r=(sz-sw)/2,c=2*Math.PI*r;document.getElementById('r').innerHTML=`<circle cx="42" cy="42" r="${r}" stroke="${col('--gss-line')}" stroke-width="${sw}" fill="none"/><circle cx="42" cy="42" r="${r}" stroke="${col('--gss-excellent-fg')}" stroke-width="${sw}" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c*(1-4.2/5)}" transform="rotate(-90 42 42)"/>`;})();
</script>
</body></html>
