<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;font-family:'IBM Plex Sans',sans-serif;background:#FAFAF7;padding:20px;}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:9px 14px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid transparent;cursor:pointer;font-family:inherit;}
  .primary{background:#0B0B0D;color:#FAFAF7;}
  .secondary{background:#FFF;color:#0B0B0D;border-color:#DAD7CE;}
  .ghost{background:transparent;color:#0B0B0D;}
  .sm{padding:6px 10px;font-size:12px;}
  .lg{padding:12px 18px;font-size:14px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .cap{font-family:'IBM Plex Mono';font-size:10px;color:#6E6E76;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px;}
</style></head><body>
  <p class="cap">.gss-btn · variantes</p>
  <div class="row">
    <button class="btn primary">Salvar check-in</button>
    <button class="btn secondary">Cancelar</button>
    <button class="btn ghost">Detalhes</button>
  </div>
  <p class="cap">tamanhos</p>
  <div class="row">
    <button class="btn primary sm">Small</button>
    <button class="btn primary">Default</button>
    <button class="btn primary lg">Large</button>
  </div>
</body></html>
