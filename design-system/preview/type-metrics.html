<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;font-family:'IBM Plex Sans',sans-serif;background:#FAFAF7;padding:20px;color:#0B0B0D;}
  .eyebrow{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6E6E76;font-weight:500;}
  .metric{font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;}
  .grid{display:flex;gap:32px;align-items:flex-end;}
  .item .cap{font-family:'IBM Plex Mono';font-size:10px;color:#6E6E76;margin-top:6px;}
  u{color:#6E6E76;font-family:'IBM Plex Mono';font-size:14px;text-decoration:none;}
</style></head><body>
  <p class="eyebrow" style="margin:0 0 16px;">Números em IBM Plex Mono · tabular</p>
  <div class="grid">
    <div class="item"><span class="metric" style="font-size:44px;">4.2 <u>/ 5</u></span><div class="cap">metric-xl · 44</div></div>
    <div class="item"><span class="metric" style="font-size:30px;">2.5<u>L</u></span><div class="cap">metric-lg · 30</div></div>
    <div class="item"><span class="metric" style="font-size:20px;">6/10</span><div class="cap">metric-md · 20</div></div>
  </div>
</body></html>
