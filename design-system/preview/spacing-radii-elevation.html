<!-- @dsCard group="Spacing" -->
<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;font-family:'IBM Plex Mono',monospace;background:#FAFAF7;padding:20px;color:#0B0B0D;}
  .cap{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#6E6E76;margin:0 0 14px;}
  .wrap{display:flex;gap:40px;}
  .radii{display:flex;gap:16px;align-items:flex-end;}
  .r{text-align:center;}
  .r div{background:#F3F2EE;border:1px solid #DAD7CE;}
  .r span{font-size:10px;color:#6E6E76;display:block;margin-top:6px;}
  .elev{display:flex;gap:18px;}
  .e{width:52px;height:52px;background:#fff;border-radius:8px;}
  .e1{box-shadow:0 1px 0 rgba(11,11,13,0.04),0 1px 2px rgba(11,11,13,0.04);}
  .e2{box-shadow:0 1px 0 rgba(11,11,13,0.04),0 6px 18px -8px rgba(11,11,13,0.10);}
  .e3{box-shadow:0 1px 0 rgba(11,11,13,0.04),0 24px 48px -24px rgba(11,11,13,0.20);}
</style></head><body>
<div class="wrap">
  <div>
    <p class="cap">Raios</p>
    <div class="radii">
      <div class="r"><div style="width:46px;height:46px;border-radius:6px;"></div><span>6 sm</span></div>
      <div class="r"><div style="width:46px;height:46px;border-radius:10px;"></div><span>10 md</span></div>
      <div class="r"><div style="width:46px;height:46px;border-radius:14px;"></div><span>14 lg</span></div>
    </div>
  </div>
  <div>
    <p class="cap">Elevação</p>
    <div class="elev"><div class="e e1"></div><div class="e e2"></div><div class="e e3"></div></div>
  </div>
</div>
</body></html>
