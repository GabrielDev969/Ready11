<!-- @dsCard group="Colors" -->
<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;font-family:'IBM Plex Mono',monospace;background:#FAFAF7;padding:18px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .sw{height:60px;border-radius:6px;border:1px solid rgba(0,0,0,0.06);}
  .lbl{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;}
  .lbl b{font-weight:500;color:#0B0B0D;}.lbl span{color:#6E6E76;}
</style></head><body>
<div class="row">
  <div><div class="sw" style="background:#FAFAF7;border-color:#DAD7CE;"></div><div class="lbl"><b>bg</b><span>#FAFAF7</span></div></div>
  <div><div class="sw" style="background:#FFFFFF;border-color:#DAD7CE;"></div><div class="lbl"><b>elev</b><span>#FFFFFF</span></div></div>
  <div><div class="sw" style="background:#F3F2EE;"></div><div class="lbl"><b>sunken</b><span>#F3F2EE</span></div></div>
  <div><div class="sw" style="background:#0B0B0D;"></div><div class="lbl"><b>inverse</b><span>#0B0B0D</span></div></div>
  <div><div class="sw" style="background:#3D3D42;"></div><div class="lbl"><b>fg-2</b><span>#3D3D42</span></div></div>
  <div><div class="sw" style="background:#6E6E76;"></div><div class="lbl"><b>fg-3</b><span>#6E6E76</span></div></div>
  <div><div class="sw" style="background:#E8E6DF;"></div><div class="lbl"><b>line</b><span>#E8E6DF</span></div></div>
  <div><div class="sw" style="background:#C5C2B7;"></div><div class="lbl"><b>line-strong</b><span>#C5C2B7</span></div></div>
</div>
</body></html>
