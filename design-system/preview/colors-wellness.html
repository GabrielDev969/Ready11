<!doctype html><html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  body{margin:0;font-family:'IBM Plex Mono',monospace;background:#FAFAF7;padding:18px;}
  .grid{display:flex;flex-direction:column;gap:10px;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.03em;}
  .dot{width:6px;height:6px;border-radius:999px;}
  .line{display:flex;align-items:center;gap:12px;}
  .meaning{font-size:11px;color:#6E6E76;font-family:'IBM Plex Mono';}
  .row{display:flex;gap:8px;}
</style></head><body>
<div class="grid">
  <div class="line"><span class="pill" style="background:oklch(0.96 0.04 145);color:oklch(0.42 0.10 145);"><span class="dot" style="background:oklch(0.42 0.10 145)"></span>EXCELLENT</span><span class="meaning">prontidão perfeita</span></div>
  <div class="line"><span class="pill" style="background:oklch(0.96 0.03 235);color:oklch(0.40 0.11 235);"><span class="dot" style="background:oklch(0.40 0.11 235)"></span>GOOD</span><span class="meaning">fadiga adaptativa normal</span></div>
  <div class="line"><span class="pill" style="background:oklch(0.96 0.05 85);color:oklch(0.45 0.12 75);"><span class="dot" style="background:oklch(0.45 0.12 75)"></span>WARNING</span><span class="meaning">moderar carga interna</span></div>
  <div class="line"><span class="pill" style="background:oklch(0.95 0.04 25);color:oklch(0.45 0.16 25);"><span class="dot" style="background:oklch(0.45 0.16 25)"></span>CRITICAL</span><span class="meaning">risco de lesão / overtraining</span></div>
</div>
</body></html>
