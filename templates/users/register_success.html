{% extends "base.html" %}

{% block title %}E-mail Enviado{% endblock %}

{% block content %}
<div class="w-full max-w-md bg-white rounded-xl shadow-sm border border-gray-100 p-8 text-center">
    
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
        <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
    </div>

    <h2 class="text-2xl font-semibold text-gray-900">Verifique seu e-mail</h2>
    <p class="text-sm text-gray-500 mt-2 mb-6">
        Enviamos um link de confirmação para você. Clique no link para verificar sua conta e acessar o sistema.
    </p>

    <a href="/" class="text-sm font-medium text-black hover:underline">Voltar para o início</a>
</div>
{% endblock %}
