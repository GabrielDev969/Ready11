<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server error | Ready11</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f9fafb; color: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 3rem 2.5rem; text-align: center; max-width: 500px; width: 100%; }
        .code { font-size: 5rem; font-weight: 700; color: #e5e7eb; line-height: 1; }
        h1 { font-size: 1.5rem; font-weight: 600; margin-top: 1rem; }
        p { font-size: 0.875rem; color: #6b7280; margin-top: 0.75rem; }
        a { display: inline-block; margin-top: 2rem; padding: 0.625rem 1.25rem; background: #111827; color: white; border-radius: 6px; font-size: 0.875rem; font-weight: 500; text-decoration: none; }
        a:hover { background: #1f2937; }
    </style>
</head>
<body>
    <div class="card">
        <p class="code">500</p>
        <h1>Something went wrong</h1>
        <p>An unexpected error occurred on our side. We've been notified and are working on it.</p>
        <a href="/">Go home</a>
    </div>
</body>
</html>
