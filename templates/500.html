<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server error | Ready11</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: #FAFAF7; color: #0B0B0D; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
        .card { background: #FFFFFF; border: 1px solid #E8E6DF; border-radius: 14px; padding: 3rem 2.5rem; text-align: center; max-width: 500px; width: 100%; }
        .code { font-size: 6rem; font-weight: 600; color: #E8E6DF; line-height: 1; }
        h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-top: 1rem; }
        p { color: #6E6E76; margin-top: 0.75rem; }
        a { display: inline-block; margin-top: 2rem; padding: 0.625rem 1.25rem; background: #0B0B0D; color: #FAFAF7; border-radius: 6px; font-size: 0.875rem; font-weight: 500; text-decoration: none; }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="card">
        <p class="code">500</p>
        <h1>Something went wrong</h1>
        <p>An unexpected error occurred on our side. We've been notified and are working on it.</p>
        <a href="/">Go home</a>
    </div>
</body>
</html>
