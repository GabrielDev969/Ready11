{% load i18n %}
<div id="toast-root" class="toast-root" aria-live="polite"></div>
<script>
(function () {
    var proto = location.protocol === 'https:' ? 'wss' : 'ws';
    var url = proto + '://' + location.host + '/ws/notifications/';
    var root = document.getElementById('toast-root');

    function setBadge(count) {
        var b = document.getElementById('notif-badge');
        if (!b) return;
        b.dataset.count = count;
        b.textContent = count;
        if (count > 0) { b.classList.remove('hidden'); }
        else { b.classList.add('hidden'); }
    }

    // Refresh the bell dropdown (and badge) from the server's authoritative feed,
    // so a notification that just arrived shows up without a page reload.
    function refreshBell() {
        fetch('/notifications/feed/', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
                if (!data) return;
                var list = document.getElementById('notif-bell-list');
                if (list && typeof data.html === 'string') { list.innerHTML = data.html; }
                setBadge(data.unread || 0);
            })
            .catch(function () {});
    }

    function showToast(data) {
        if (!root) return;
        var el = document.createElement('div');
        el.className = 'toast';

        var content = document.createElement('div');
        content.className = 'toast-content';
        var title = document.createElement('div');
        title.className = 'toast-title';
        title.textContent = data.title || '{% trans "New notification" %}';
        content.appendChild(title);
        if (data.body) {
            var body = document.createElement('div');
            body.className = 'toast-body';
            body.textContent = data.body;
            content.appendChild(body);
        }
        if (data.url) {
            content.addEventListener('click', function () { window.location = data.url; });
        }

        var close = document.createElement('button');
        close.className = 'toast-close';
        close.setAttribute('aria-label', '{% trans "Close" %}');
        close.innerHTML = '&times;';

        var removed = false;
        function remove() { if (removed) return; removed = true; el.remove(); }
        close.addEventListener('click', function (e) { e.stopPropagation(); remove(); });

        el.appendChild(content);
        el.appendChild(close);
        root.appendChild(el);
        setTimeout(remove, 3000); // auto-dismiss after 3s
    }

    function connect() {
        var ws;
        try { ws = new WebSocket(url); } catch (e) { return; }
        ws.onmessage = function (ev) {
            var data;
            try { data = JSON.parse(ev.data); } catch (e) { return; }
            refreshBell();
            showToast(data);
        };
        ws.onclose = function () { setTimeout(connect, 5000); }; // basic reconnect
    }
    connect();
})();
</script>
