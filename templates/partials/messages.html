{% if messages %}
<div class="mx-auto w-full max-w-2xl px-6 pt-6 space-y-2">
    {% for message in messages %}
    <div class="flex items-start justify-between gap-3 rounded-md border p-3 text-body
                {% if message.tags == 'error' %}border-critical-fg/20 bg-critical-bg text-critical-fg
                {% elif message.tags == 'warning' %}border-warning-fg/20 bg-warning-bg text-warning-fg
                {% elif message.tags == 'success' %}border-good-fg/20 bg-good-bg text-good-fg
                {% else %}border-line bg-sunken text-fg2{% endif %}">
        <span>{{ message }}</span>
        <button type="button" onclick="this.parentElement.remove()" aria-label="Dismiss"
                class="shrink-0 opacity-60 hover:opacity-100">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    {% endfor %}
</div>
{% endif %}
