{% load i18n %}
<details class="ui-dropdown relative">
    <summary class="flex cursor-pointer list-none items-center gap-2 rounded-md px-1.5 py-1 hover:bg-sunken">
        <span class="gss-avatar font-semibold">
            {{ user.first_name|first|upper }}{{ user.last_name|first|upper }}
        </span>
        <span class="hidden text-sm font-medium text-fg2 sm:inline">{{ user.first_name }}</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-fg4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
    </summary>
    <div class="absolute right-0 z-30 mt-2 w-56 rounded-md border border-line bg-elev p-1.5 shadow-card-md animate-fade-in-up">
        <div class="border-b border-line px-2 pb-2 pt-1">
            <p class="truncate text-sm font-medium text-fg">{{ user.first_name }} {{ user.last_name }}</p>
            <p class="truncate text-xs text-fg3">{{ user.email }}</p>
        </div>
        <a href="{% url 'profile' %}" class="mt-1 flex items-center gap-2 rounded-md px-2 py-1.5 text-sm text-fg2 hover:bg-sunken hover:text-fg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-fg4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            {% trans "Profile" %}
        </a>
        <a href="{% url 'settings' %}" class="flex items-center gap-2 rounded-md px-2 py-1.5 text-sm text-fg2 hover:bg-sunken hover:text-fg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-fg4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            {% trans "Settings" %}
        </a>
        <a href="{% url 'logout' %}" class="mt-1 flex items-center gap-2 rounded-md border-t border-line px-2 py-1.5 pt-2 text-sm font-medium text-critical-fg hover:bg-critical-bg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
            {% trans "Log out" %}
        </a>
    </div>
</details>
