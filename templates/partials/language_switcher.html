{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
{% get_available_languages as LANGUAGES %}
<details class="ui-dropdown relative">
    <summary class="flex cursor-pointer list-none items-center gap-1.5 rounded-md border border-line-2 bg-elev px-2 py-1.5 hover:bg-sunken"
             title="{% trans 'Change language' %}">
        {% include 'partials/flag.html' with code=LANGUAGE_CODE %}
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-fg4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
        </svg>
    </summary>
    <div class="absolute right-0 z-30 mt-2 w-48 rounded-md border border-line bg-elev p-1.5 shadow-card-md">
        {% for code, name in LANGUAGES %}
        <form action="{% url 'set_language' %}" method="post">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <input type="hidden" name="language" value="{{ code }}">
            <button type="submit" class="flex w-full items-center gap-2 rounded-md px-2 py-1.5 text-sm {% if code == LANGUAGE_CODE %}bg-sunken font-medium text-fg{% else %}text-fg2 hover:bg-sunken{% endif %}">
                {% include 'partials/flag.html' with code=code %}
                <span>{{ name }}</span>
            </button>
        </form>
        {% endfor %}
    </div>
</details>
