name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Ruff and Bandit
        run: pip install ruff bandit

      - name: Run Ruff
        run: ruff check .

      - name: Run Bandit (SAST)
        run: bandit -r . -x ./venv,./node_modules,./staticfiles,./*/migrations -ll

  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.mjs

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ready_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          DEBUG: 'True'
          SECRET_KEY: ci-test-only-secret-key-not-for-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ready_db_test
          AXES_ENABLED: 'False'
        run: |
          coverage run manage.py test --verbosity=2
          coverage report --fail-under=60
          coverage xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt

  security-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ready_db_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django deployment security check
        env:
          DEBUG: 'False'
          SECRET_KEY: 'gH3kP9mN2xQ7vL5wR8tY4uJ6bF1cA0eD-zS-nW-iO-qE-yM-hK-pX-oV-jU-lT'
          ALLOWED_HOSTS: example.com
          PUBLIC_DOMAIN: example.com
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ready_db_check
        run: python manage.py check --deploy --fail-level WARNING
