name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ready_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          DEBUG: 'True'
          SECRET_KEY: ci-test-only-secret-key-not-for-production
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ready_db_test
          AXES_ENABLED: 'False'
        run: python manage.py test --verbosity=2

  security-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ready_db_check
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Django deployment security check
        env:
          DEBUG: 'False'
          SECRET_KEY: ci-security-check-key-not-for-production
          ALLOWED_HOSTS: example.com
          PUBLIC_DOMAIN: example.com
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ready_db_check
        run: python manage.py check --deploy --fail-level WARNING
